out_dir: clnet
criterion: WBCE
model: CLNet
out_type: logits
cmb_coeffs:
  - 1.0
  - 0.4
  - 0.4

device: cuda:0

# Optimizer
optimizer: Adam
lr: 0.001
weight_decay: 0.0
load_optim: False
save_optim: False
sched_on: True
schedulers:
  - name: StepLR
    step_size: 25
    gamma: 0.2

repeats: 6
batch_size: 8